<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Clarim diário</title>
    <link rel="stylesheet" href="../../css/main.css" />
    <script src="/js/components/site-header.js" defer></script>
    <script src="/js/components/site-footer.js" defer></script>
    <script type="module" src="login.js"></script>
  </head>
  <body>
    <site-header></site-header>

    <main class="auth">
      <form id="form-login" class="formulario" novalidate>
        <h1>Entrar no Clarim</h1>
        <p class="subtitulo">
          Acesse sua conta e continue acompanhando as notícias.
        </p>

        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="seu@email.com"
          required
        />

        <label for="senha">Senha</label>
        <div class="campo-senha">
          <input
            type="password"
            id="senha"
            name="senha"
            placeholder="Digite sua senha"
            required
          />

          <!-- <button
            type="button"
            class="btn btn--ghost btn--icon"
            id="toggle-senha"
          >
            Mostrar
          </button> -->
        </div>

        <div class="linha linha--between">
          <label class="checkbox" for="lembrar">
            <input type="checkbox" id="lembrar" />
            <span>Lembrar-me</span>
          </label>

          <a class="link" href="#">Esqueci a senha</a>
        </div>

        <p id="aviso" class="aviso" role="status" aria-live="polite"></p>

        <button type="submit" class="btn btn--primary">Entrar</button>

        <p class="rodape-form">
          Ainda não tem conta?
          <a href="cadastro.html">Criar conta</a>
        </p>
      </form>
    </main>

    <site-footer></site-footer>
  </body>
</html>
